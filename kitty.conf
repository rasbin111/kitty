include Nord.conf
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0

# Ligatures (disable if you don't like them)
# disable_ligatures never

# === Cursor ===
cursor_shape beam
cursor_blink_interval 0.5

# === Window ===
hide_window_decorations yes
confirm_os_window_close 0

# === Tab bar ===
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{title}"

# === Scrollback ===
scrollback_lines 10000

# === Mouse ===
mouse_hide_wait 3.0
url_style curly

# === Performance ===
repaint_delay 7
input_delay 1
sync_to_monitor yes

